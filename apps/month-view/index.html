<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Month View</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Google Sans', Roboto, Arial, sans-serif;
      background: #fff;
      color: #3c4043;
      overflow-x: hidden;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 16px;
    }

    /* ---- Header / Navigation ---- */

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      user-select: none;
    }

    .today-btn {
      background: none;
      border: 1px solid #dadce0;
      border-radius: 4px;
      padding: 6px 16px;
      font-family: 'Google Sans', Roboto, Arial, sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      color: #3c4043;
      transition: background 0.15s, border-color 0.15s;
      line-height: 20px;
    }

    .today-btn:hover {
      background: #f1f3f4;
      border-color: #c0c4c8;
    }

    .nav-btn {
      background: none;
      border: none;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #5f6368;
      transition: background 0.15s;
    }

    .nav-btn:hover {
      background: #f1f3f4;
    }

    .nav-btn svg {
      width: 20px;
      height: 20px;
      fill: #5f6368;
    }

    .header h1 {
      font-family: 'Google Sans', Roboto, Arial, sans-serif;
      font-size: 22px;
      font-weight: 400;
      color: #3c4043;
      white-space: nowrap;
    }

    /* ---- Day-of-week headers ---- */

    .dow-row {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      border-bottom: 1px solid #dadce0;
    }

    .dow-cell {
      text-align: center;
      padding: 8px 0;
      font-size: 11px;
      font-weight: 500;
      color: #70757a;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    /* ---- Calendar Grid ---- */

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      border-left: 1px solid #dadce0;
    }

    .day-cell {
      min-height: 80px;
      border-right: 1px solid #dadce0;
      border-bottom: 1px solid #dadce0;
      padding: 2px 4px;
      background: #fff;
      cursor: pointer;
      transition: background 0.1s;
      position: relative;
      overflow: hidden;
    }

    .day-cell:hover {
      background: #f8f9fa;
    }

    .day-cell.outside-month {
      color: #70757a;
      opacity: 0.5;
      background: #fff;
    }

    /* ---- Day number ---- */

    .day-number {
      font-size: 12px;
      font-weight: 500;
      color: #3c4043;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 2px auto 2px 2px;
      border-radius: 50%;
      line-height: 1;
    }

    .day-cell.today .day-number {
      background: #1a73e8;
      color: #fff;
      font-weight: 500;
    }

    .day-cell.outside-month .day-number {
      color: #70757a;
    }

    /* ---- Event pills ---- */

    .event-pill {
      display: block;
      height: 20px;
      line-height: 20px;
      border-radius: 4px;
      padding: 0 6px;
      margin-bottom: 1px;
      font-size: 11px;
      font-weight: 500;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .event-pill:hover {
      opacity: 0.85;
    }

    .event-pill.all-day {
      background: #039be5;
    }

    /* ---- "+N more" link ---- */

    .more-link {
      font-size: 11px;
      color: #1a73e8;
      cursor: pointer;
      padding: 1px 6px;
      font-weight: 500;
      line-height: 18px;
    }

    .more-link:hover {
      text-decoration: underline;
    }

    /* ---- Popup / Overlay ---- */

    .popup-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.3);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .popup {
      font-family: 'Google Sans', Roboto, Arial, sans-serif;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 8px 10px 1px rgba(0,0,0,.14), 0 3px 14px 2px rgba(0,0,0,.12), 0 5px 5px -3px rgba(0,0,0,.2);
      max-width: 380px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      padding: 20px;
      position: relative;
    }

    .popup-close {
      position: absolute;
      top: 12px;
      right: 12px;
      background: none;
      border: none;
      font-size: 20px;
      color: #5f6368;
      cursor: pointer;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
    }

    .popup-close:hover {
      background: #f1f3f4;
    }

    .popup h2 {
      font-family: 'Google Sans', Roboto, Arial, sans-serif;
      font-size: 16px;
      font-weight: 500;
      margin-bottom: 12px;
      color: #3c4043;
      padding-right: 28px;
    }

    .popup-event-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px 6px;
      border-bottom: 1px solid #dadce0;
      cursor: pointer;
      transition: background 0.1s;
      border-radius: 4px;
    }

    .popup-event-item:hover {
      background: #f8f9fa;
    }

    .popup-event-item:last-child {
      border-bottom: none;
    }

    .popup-event-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 4px;
    }

    .popup-event-info {
      flex: 1;
      min-width: 0;
    }

    .popup-event-title {
      font-size: 13px;
      font-weight: 500;
      color: #3c4043;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .popup-event-time {
      font-size: 11px;
      color: #70757a;
      margin-top: 2px;
    }

    /* ---- Detail popup ---- */

    .detail-popup h2 {
      font-size: 18px;
      font-weight: 400;
      color: #3c4043;
      margin-bottom: 4px;
    }

    .detail-section {
      padding: 8px 0;
      border-bottom: 1px solid #dadce0;
      font-size: 13px;
      color: #5f6368;
    }

    .detail-section:last-child {
      border-bottom: none;
    }

    .detail-label {
      font-size: 11px;
      color: #70757a;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 4px;
      font-weight: 500;
    }

    .detail-value {
      color: #3c4043;
    }

    /* ---- Loading & empty states ---- */

    .loading {
      text-align: center;
      padding: 60px 20px;
      color: #70757a;
      font-size: 14px;
      grid-column: 1 / -1;
    }

    .loading-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #dadce0;
      border-top-color: #1a73e8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #70757a;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <button class="today-btn" id="today-btn">Today</button>
      <button class="nav-btn" id="prev-btn" aria-label="Previous month">
        <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
      </button>
      <button class="nav-btn" id="next-btn" aria-label="Next month">
        <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
      </button>
      <h1 id="month-title">Loading...</h1>
    </div>
    <div class="dow-row">
      <div class="dow-cell">Sun</div>
      <div class="dow-cell">Mon</div>
      <div class="dow-cell">Tue</div>
      <div class="dow-cell">Wed</div>
      <div class="dow-cell">Thu</div>
      <div class="dow-cell">Fri</div>
      <div class="dow-cell">Sat</div>
    </div>
    <div class="calendar-grid" id="calendar-grid">
      <div class="loading">
        <div class="loading-spinner"></div>
        Waiting for calendar data...
      </div>
    </div>
  </div>
  <div id="popup-container"></div>
  <script type="module" src="./src/app.ts"></script>
</body>
</html>
