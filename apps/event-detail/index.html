<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Event Detail</title>
  <style>
    :root {
      --bg: #ffffff;
      --bg-secondary: #f8f9fa;
      --bg-hover: #f1f3f4;
      --bg-active: #e8eaed;
      --text-primary: #3c4043;
      --text-secondary: #70757a;
      --text-icon: #5f6368;
      --text-muted: #70757a;
      --border: #dadce0;
      --border-light: #dadce0;
      --accent: #1a73e8;
      --accent-hover: #1765cc;
      --accent-light: #e8f0fe;
      --accent-text: #1a73e8;
      --red: #d93025;
      --green: #0b8043;
      --shadow-sm: 0 1px 2px 0 rgba(60,64,67,.3), 0 1px 3px 1px rgba(60,64,67,.15);
      --shadow-md: 0 1px 3px 0 rgba(60,64,67,.3), 0 4px 8px 3px rgba(60,64,67,.15);
      --shadow-lg: 0 1px 3px 0 rgba(60,64,67,.3), 0 4px 8px 3px rgba(60,64,67,.15);
      --card-bg: #ffffff;
      --font-stack: 'Google Sans', Roboto, Arial, sans-serif;
    }

    [data-theme="dark"] {
      --bg: #1f1f1f;
      --bg-secondary: #2d2d2d;
      --bg-hover: #3c3c3c;
      --bg-active: #4a4a4a;
      --text-primary: #e8eaed;
      --text-secondary: #9aa0a6;
      --text-icon: #9aa0a6;
      --text-muted: #9aa0a6;
      --border: #3c4043;
      --border-light: #3c4043;
      --accent: #8ab4f8;
      --accent-hover: #aecbfa;
      --accent-light: #1a3a5c;
      --accent-text: #8ab4f8;
      --red: #f28b82;
      --green: #81c995;
      --yellow: #fdd663;
      --current-time: #f28b82;
      --shadow-sm: 0 1px 3px 0 rgba(0,0,0,.5), 0 1px 2px 0 rgba(0,0,0,.3);
      --shadow-md: 0 2px 6px 2px rgba(0,0,0,.5), 0 1px 2px 0 rgba(0,0,0,.3);
      --shadow-lg: 0 2px 6px 2px rgba(0,0,0,.5), 0 1px 2px 0 rgba(0,0,0,.3);
      --card-bg: #2d2d2d;
      --hour-height: 48px;
      --time-gutter: 56px;
      --label-width: 150px;
    }

    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --bg: #1f1f1f;
        --bg-secondary: #2d2d2d;
        --bg-hover: #3c3c3c;
        --bg-active: #4a4a4a;
        --text-primary: #e8eaed;
        --text-secondary: #9aa0a6;
        --text-icon: #9aa0a6;
        --text-muted: #9aa0a6;
        --border: #3c4043;
        --border-light: #3c4043;
        --accent: #8ab4f8;
        --accent-hover: #aecbfa;
        --accent-light: #1a3a5c;
        --accent-text: #8ab4f8;
        --red: #f28b82;
        --green: #81c995;
        --yellow: #fdd663;
        --current-time: #f28b82;
        --shadow-sm: 0 1px 3px 0 rgba(0,0,0,.5), 0 1px 2px 0 rgba(0,0,0,.3);
        --shadow-md: 0 2px 6px 2px rgba(0,0,0,.5), 0 1px 2px 0 rgba(0,0,0,.3);
        --shadow-lg: 0 2px 6px 2px rgba(0,0,0,.5), 0 1px 2px 0 rgba(0,0,0,.3);
        --card-bg: #2d2d2d;
        --hour-height: 48px;
        --time-gutter: 56px;
        --label-width: 150px;
      }
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-stack);
      background: var(--bg);
      color: var(--text-primary);
      display: flex;
      justify-content: center;
      padding: 24px;
      min-height: 100vh;
    }

    .card-container {
      width: 100%;
      width: 100%;
    }

    .card {
      background: var(--card-bg);
      border-radius: 8px;
      box-shadow: var(--shadow-md);
      overflow: hidden;
      display: flex;
      flex-direction: row;
    }

    .color-strip {
      width: 4px;
      flex-shrink: 0;
      background: #039be5;
    }

    .card-body {
      flex: 1;
      padding: 24px 24px 20px;
      min-width: 0;
    }

    .title-section {
      margin-bottom: 20px;
    }

    .event-title {
      font-size: 22px;
      font-weight: 400;
      color: var(--text-primary);
      line-height: 1.4;
      word-break: break-word;
    }

    .calendar-name {
      font-size: 14px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    .section {
      padding: 14px 0;
      border-top: 1px solid var(--border);
    }

    .section-row {
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }

    .section-icon {
      font-size: 20px;
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
      color: var(--text-icon);
      line-height: 1;
    }

    .section-content {
      flex: 1;
      min-width: 0;
    }

    .section-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .section-value {
      font-size: 14px;
      color: var(--text-primary);
      line-height: 1.5;
    }

    .location-link {
      color: var(--accent);
      cursor: pointer;
      text-decoration: none;
    }

    .location-link:hover {
      text-decoration: underline;
    }

    .description-text {
      font-size: 14px;
      color: var(--text-primary);
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .join-meeting-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 0 24px;
      height: 36px;
      font-family: var(--font-stack);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s;
      letter-spacing: 0.25px;
    }

    .join-meeting-btn:hover {
      background: var(--accent-hover);
      box-shadow: var(--shadow-md);
    }

    .meeting-provider {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 8px;
    }

    .attendees-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .attendee-chip {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 6px 0;
    }

    .attendee-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--bg-active);
      color: var(--text-icon);
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      text-transform: uppercase;
    }

    .attendee-info {
      flex: 1;
      min-width: 0;
    }

    .attendee-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .attendee-email {
      font-size: 12px;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .attendee-status {
      font-size: 16px;
      flex-shrink: 0;
      width: 24px;
      text-align: center;
    }

    .organizer-section {
      font-size: 14px;
      color: var(--text-icon);
    }

    .organizer-name {
      font-weight: 500;
      color: var(--text-primary);
    }

    .recurrence-text {
      font-size: 14px;
      color: var(--text-icon);
    }

    .action-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      margin-top: 8px;
    }

    .action-btn {
      border: none;
      border-radius: 4px;
      padding: 0 12px;
      height: 36px;
      font-family: var(--font-stack);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      background: transparent;
      color: var(--accent);
      transition: background 0.15s;
      letter-spacing: 0.25px;
    }

    .action-btn:hover {
      background: var(--accent-light);
    }

    .action-btn.accept {
      color: var(--accent);
    }

    .action-btn.accept:hover {
      background: var(--accent-light);
    }

    .action-btn.decline {
      color: var(--red);
    }

    .action-btn.decline:hover {
      background: rgba(242, 139, 130, 0.15);
    }

    .action-btn.maybe {
      color: var(--accent);
    }

    .action-btn.maybe:hover {
      background: var(--accent-light);
    }

    .action-btn.delete {
      color: var(--red);
    }

    .action-btn.delete:hover {
      background: rgba(242, 139, 130, 0.15);
    }

    .action-btn.edit {
      color: var(--text-secondary);
      cursor: not-allowed;
      opacity: 0.5;
    }

    .action-btn.edit:hover {
      background: transparent;
    }

    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-secondary);
      font-size: 14px;
    }

    .loading-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .confirm-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .confirm-dialog {
      background: var(--bg);
      border-radius: 8px;
      padding: 24px;
      box-shadow: var(--shadow-md);
      max-width: 400px;
      width: 90%;
    }

    .confirm-dialog h3 {
      font-size: 16px;
      font-weight: 500;
      margin-bottom: 8px;
      color: var(--text-primary);
    }

    .confirm-dialog p {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .confirm-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .confirm-cancel-btn {
      background: transparent;
      border: none;
      border-radius: 4px;
      padding: 0 12px;
      height: 36px;
      font-family: var(--font-stack);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      color: var(--accent);
      transition: background 0.15s;
    }

    .confirm-cancel-btn:hover {
      background: var(--accent-light);
    }

    .confirm-delete-btn {
      background: var(--red);
      border: none;
      border-radius: 4px;
      padding: 0 24px;
      height: 36px;
      font-family: var(--font-stack);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      color: #fff;
      transition: background 0.15s;
    }

    .confirm-delete-btn:hover {
      background: #c5221f;
    }

    .status-toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #323232;
      color: #fff;
      padding: 12px 24px;
      border-radius: 4px;
      font-family: var(--font-stack);
      font-size: 14px;
      z-index: 200;
      box-shadow: var(--shadow-md);
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="card-container" id="card-container">
    <div class="loading">
      <div class="loading-spinner"></div>
      Waiting for event data...
    </div>
  </div>
  <div id="overlay-container"></div>
  <script type="module" src="./src/app.ts"></script>
</body>
</html>
