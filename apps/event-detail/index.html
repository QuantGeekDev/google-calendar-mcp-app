<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Event Detail</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Google Sans', Roboto, Arial, sans-serif;
      background: #fff;
      color: #3c4043;
      display: flex;
      justify-content: center;
      padding: 24px;
      min-height: 100vh;
    }

    .card-container {
      width: 100%;
      width: 100%;
    }

    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 3px 0 rgba(60,64,67,.3), 0 4px 8px 3px rgba(60,64,67,.15);
      overflow: hidden;
      display: flex;
      flex-direction: row;
    }

    .color-strip {
      width: 4px;
      flex-shrink: 0;
      background: #039be5;
    }

    .card-body {
      flex: 1;
      padding: 24px 24px 20px;
      min-width: 0;
    }

    .title-section {
      margin-bottom: 20px;
    }

    .event-title {
      font-size: 22px;
      font-weight: 400;
      color: #3c4043;
      line-height: 1.4;
      word-break: break-word;
    }

    .calendar-name {
      font-size: 14px;
      color: #70757a;
      margin-top: 4px;
    }

    .section {
      padding: 14px 0;
      border-top: 1px solid #dadce0;
    }

    .section-row {
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }

    .section-icon {
      font-size: 20px;
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
      color: #5f6368;
      line-height: 1;
    }

    .section-content {
      flex: 1;
      min-width: 0;
    }

    .section-label {
      font-size: 11px;
      font-weight: 500;
      color: #70757a;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .section-value {
      font-size: 14px;
      color: #3c4043;
      line-height: 1.5;
    }

    .location-link {
      color: #1a73e8;
      cursor: pointer;
      text-decoration: none;
    }

    .location-link:hover {
      text-decoration: underline;
    }

    .description-text {
      font-size: 14px;
      color: #3c4043;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .join-meeting-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 0 24px;
      height: 36px;
      font-family: 'Google Sans', Roboto, Arial, sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s;
      letter-spacing: 0.25px;
    }

    .join-meeting-btn:hover {
      background: #1765cc;
      box-shadow: 0 1px 3px 0 rgba(60,64,67,.3), 0 4px 8px 3px rgba(60,64,67,.15);
    }

    .meeting-provider {
      font-size: 12px;
      color: #70757a;
      margin-top: 8px;
    }

    .attendees-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .attendee-chip {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 6px 0;
    }

    .attendee-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #e8eaed;
      color: #5f6368;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      text-transform: uppercase;
    }

    .attendee-info {
      flex: 1;
      min-width: 0;
    }

    .attendee-name {
      font-size: 14px;
      font-weight: 500;
      color: #3c4043;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .attendee-email {
      font-size: 12px;
      color: #70757a;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .attendee-status {
      font-size: 16px;
      flex-shrink: 0;
      width: 24px;
      text-align: center;
    }

    .organizer-section {
      font-size: 14px;
      color: #5f6368;
    }

    .organizer-name {
      font-weight: 500;
      color: #3c4043;
    }

    .recurrence-text {
      font-size: 14px;
      color: #5f6368;
    }

    .action-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      padding-top: 20px;
      border-top: 1px solid #dadce0;
      margin-top: 8px;
    }

    .action-btn {
      border: none;
      border-radius: 4px;
      padding: 0 12px;
      height: 36px;
      font-family: 'Google Sans', Roboto, Arial, sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      background: transparent;
      color: #1a73e8;
      transition: background 0.15s;
      letter-spacing: 0.25px;
    }

    .action-btn:hover {
      background: #e8f0fe;
    }

    .action-btn.accept {
      color: #1a73e8;
    }

    .action-btn.accept:hover {
      background: #e8f0fe;
    }

    .action-btn.decline {
      color: #d93025;
    }

    .action-btn.decline:hover {
      background: #fce8e6;
    }

    .action-btn.maybe {
      color: #1a73e8;
    }

    .action-btn.maybe:hover {
      background: #e8f0fe;
    }

    .action-btn.delete {
      color: #d93025;
    }

    .action-btn.delete:hover {
      background: #fce8e6;
    }

    .action-btn.edit {
      color: #70757a;
      cursor: not-allowed;
      opacity: 0.5;
    }

    .action-btn.edit:hover {
      background: transparent;
    }

    .loading {
      text-align: center;
      padding: 60px 20px;
      color: #70757a;
      font-size: 14px;
    }

    .loading-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #dadce0;
      border-top-color: #1a73e8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .confirm-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .confirm-dialog {
      background: #fff;
      border-radius: 8px;
      padding: 24px;
      box-shadow: 0 1px 3px 0 rgba(60,64,67,.3), 0 4px 8px 3px rgba(60,64,67,.15);
      max-width: 400px;
      width: 90%;
    }

    .confirm-dialog h3 {
      font-size: 16px;
      font-weight: 500;
      margin-bottom: 8px;
      color: #3c4043;
    }

    .confirm-dialog p {
      font-size: 14px;
      color: #70757a;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .confirm-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .confirm-cancel-btn {
      background: transparent;
      border: none;
      border-radius: 4px;
      padding: 0 12px;
      height: 36px;
      font-family: 'Google Sans', Roboto, Arial, sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      color: #1a73e8;
      transition: background 0.15s;
    }

    .confirm-cancel-btn:hover {
      background: #e8f0fe;
    }

    .confirm-delete-btn {
      background: #d93025;
      border: none;
      border-radius: 4px;
      padding: 0 24px;
      height: 36px;
      font-family: 'Google Sans', Roboto, Arial, sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      color: #fff;
      transition: background 0.15s;
    }

    .confirm-delete-btn:hover {
      background: #c5221f;
    }

    .status-toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #323232;
      color: #fff;
      padding: 12px 24px;
      border-radius: 4px;
      font-family: 'Google Sans', Roboto, Arial, sans-serif;
      font-size: 14px;
      z-index: 200;
      box-shadow: 0 1px 3px 0 rgba(60,64,67,.3), 0 4px 8px 3px rgba(60,64,67,.15);
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="card-container" id="card-container">
    <div class="loading">
      <div class="loading-spinner"></div>
      Waiting for event data...
    </div>
  </div>
  <div id="overlay-container"></div>
  <script type="module" src="./src/app.ts"></script>
</body>
</html>
