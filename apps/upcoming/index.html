<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Upcoming Events</title>
<style>
  :root {
    --bg: #fff;
    --surface: #f8f9fa;
    --text-primary: #3c4043;
    --text-secondary: #70757a;
    --border: #dadce0;
    --accent: #1a73e8;
    --accent-hover: #174ea6;
    --hover-bg: #f1f3f4;
    --font-stack: 'Google Sans', Roboto, Arial, sans-serif;
  }

  [data-theme="dark"] {
    --bg: #1f1f1f;
    --bg-secondary: #2d2d2d;
    --bg-hover: #3c3c3c;
    --bg-active: #4a4a4a;
    --text-primary: #e8eaed;
    --text-secondary: #9aa0a6;
    --text-icon: #9aa0a6;
    --text-muted: #9aa0a6;
    --border: #3c4043;
    --border-light: #3c4043;
    --accent: #8ab4f8;
    --accent-hover: #aecbfa;
    --accent-light: #1a3a5c;
    --accent-text: #8ab4f8;
    --red: #f28b82;
    --green: #81c995;
    --yellow: #fdd663;
    --current-time: #f28b82;
    --shadow-sm: 0 1px 3px 0 rgba(0,0,0,.5), 0 1px 2px 0 rgba(0,0,0,.3);
    --shadow-md: 0 2px 6px 2px rgba(0,0,0,.5), 0 1px 2px 0 rgba(0,0,0,.3);
    --shadow-lg: 0 2px 6px 2px rgba(0,0,0,.5), 0 1px 2px 0 rgba(0,0,0,.3);
    --card-bg: #2d2d2d;
    --hour-height: 48px;
    --time-gutter: 56px;
    --label-width: 150px;
  }

  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg: #1f1f1f;
      --bg-secondary: #2d2d2d;
      --bg-hover: #3c3c3c;
      --bg-active: #4a4a4a;
      --text-primary: #e8eaed;
      --text-secondary: #9aa0a6;
      --text-icon: #9aa0a6;
      --text-muted: #9aa0a6;
      --border: #3c4043;
      --border-light: #3c4043;
      --accent: #8ab4f8;
      --accent-hover: #aecbfa;
      --accent-light: #1a3a5c;
      --accent-text: #8ab4f8;
      --red: #f28b82;
      --green: #81c995;
      --yellow: #fdd663;
      --current-time: #f28b82;
      --shadow-sm: 0 1px 3px 0 rgba(0,0,0,.5), 0 1px 2px 0 rgba(0,0,0,.3);
      --shadow-md: 0 2px 6px 2px rgba(0,0,0,.5), 0 1px 2px 0 rgba(0,0,0,.3);
      --shadow-lg: 0 2px 6px 2px rgba(0,0,0,.5), 0 1px 2px 0 rgba(0,0,0,.3);
      --card-bg: #2d2d2d;
      --hour-height: 48px;
      --time-gutter: 56px;
      --label-width: 150px;
    }
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font-stack);
    background: var(--bg);
    color: var(--text-primary);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .container {
    width: 100%;
    margin: 0 auto;
    padding: 0 0 24px;
  }

  /* ---- Header ---- */
  .header {
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
    padding: 16px 16px 12px;
    border-bottom: 1px solid var(--border);
  }

  .header h1 {
    font-size: 22px;
    font-weight: 400;
    color: var(--text-primary);
    letter-spacing: 0;
  }

  /* ---- Day groups ---- */
  .day-group {
    /* no extra margin needed; borders separate groups */
  }

  .day-header {
    position: sticky;
    top: 53px;
    background: var(--bg);
    z-index: 5;
    padding: 12px 16px 8px;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .day-header-today {
    color: var(--accent);
  }

  .day-header-date {
    font-weight: 400;
    color: var(--text-secondary);
    font-size: 13px;
  }

  /* ---- Event cards ---- */
  .event-card {
    display: flex;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
  }

  .event-card:hover {
    background: var(--hover-bg);
  }

  .event-color-bar {
    width: 4px;
    flex-shrink: 0;
  }

  .event-content {
    flex: 1;
    padding: 12px 16px;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .event-time {
    font-size: 12px;
    color: var(--text-secondary);
    font-weight: 400;
    line-height: 1.4;
  }

  .event-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.4;
  }

  .event-location {
    font-size: 12px;
    color: var(--text-secondary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.4;
  }

  /* ---- Join meeting button ---- */
  .event-actions {
    display: flex;
    align-items: center;
    padding-right: 16px;
    flex-shrink: 0;
  }

  .join-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    height: 24px;
    padding: 0 12px;
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 12px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    font-family: var(--font-stack);
    transition: background 0.15s;
    white-space: nowrap;
    line-height: 1;
  }

  .join-btn:hover {
    background: rgba(26, 115, 232, 0.08);
  }

  /* ---- Expanded detail ---- */
  .event-detail {
    display: none;
    padding: 4px 0 8px;
    border-top: 1px solid var(--border);
    margin-top: 6px;
  }

  .event-card.expanded .event-detail {
    display: block;
  }

  .detail-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 5px 0;
    font-size: 13px;
    color: var(--text-secondary);
  }

  .detail-row-icon {
    flex-shrink: 0;
    width: 18px;
    text-align: center;
    color: var(--text-secondary);
    font-size: 14px;
  }

  .detail-row-text {
    flex: 1;
    word-break: break-word;
    line-height: 1.5;
  }

  .detail-attendees {
    margin-top: 2px;
  }

  .detail-attendee {
    padding: 2px 0;
    font-size: 12px;
    color: var(--text-secondary);
  }

  .detail-attendee .status {
    font-size: 11px;
    color: var(--text-secondary);
    margin-left: 4px;
    opacity: 0.7;
  }

  /* ---- Empty state ---- */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 20px;
    text-align: center;
  }

  .empty-state-icon {
    margin-bottom: 20px;
    color: var(--text-secondary);
    opacity: 0.5;
  }

  .empty-state-icon svg {
    width: 72px;
    height: 72px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .empty-state-text {
    font-size: 16px;
    color: var(--text-secondary);
    font-weight: 500;
  }

  .empty-state-sub {
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 6px;
  }

  /* ---- Load more ---- */
  .load-more-row {
    display: flex;
    justify-content: center;
    padding: 20px 0;
  }

  .load-more-btn {
    padding: 0;
    background: none;
    border: none;
    color: var(--accent);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    font-family: var(--font-stack);
    transition: opacity 0.15s;
  }

  .load-more-btn:hover {
    text-decoration: underline;
  }

  .load-more-btn:disabled {
    color: var(--text-secondary);
    cursor: not-allowed;
    text-decoration: none;
  }

  /* ---- Loading spinner ---- */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 20px;
    gap: 12px;
    color: var(--text-secondary);
    font-size: 14px;
  }

  .loading-spinner {
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Upcoming Events</h1>
    </div>
    <div id="eventsContainer">
      <div class="loading">
        <div class="loading-spinner"></div>
        <span>Waiting for event data...</span>
      </div>
    </div>
  </div>
  <script type="module" src="./src/app.ts"></script>
</body>
</html>
