<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Availability</title>
<style>
  :root {
    --bg: #fff;
    --surface: #f8f9fa;
    --text-primary: #3c4043;
    --text-secondary: #70757a;
    --border: #dadce0;
    --accent: #1a73e8;
    --accent-hover: #1765cc;
    --accent-bg: #e8f0fe;
    --free-bg: #e6f4ea;
    --free-border: #0b8043;
    --busy-bg: rgba(26, 115, 232, 0.7);
    --busy-hover: rgba(26, 115, 232, 0.85);
    --green: #0b8043;
    --green-light: #e6f4ea;
    --green-chip: #ceead6;
    --shadow-tooltip: 0 1px 3px 0 rgba(60, 64, 67, .3);
    --shadow-sm: 0 1px 2px 0 rgba(60, 64, 67, .3), 0 1px 3px 1px rgba(60, 64, 67, .15);
    --radius: 4px;
    --radius-md: 8px;
    --radius-pill: 100px;
    --font: 'Google Sans', Roboto, Arial, sans-serif;
    --label-width: 150px;
    --row-height: 36px;
  }

  [data-theme="dark"] {
    --bg: #1f1f1f;
    --bg-secondary: #2d2d2d;
    --bg-hover: #3c3c3c;
    --bg-active: #4a4a4a;
    --text-primary: #e8eaed;
    --text-secondary: #9aa0a6;
    --text-icon: #9aa0a6;
    --text-muted: #9aa0a6;
    --border: #3c4043;
    --border-light: #3c4043;
    --accent: #8ab4f8;
    --accent-hover: #aecbfa;
    --accent-light: #1a3a5c;
    --accent-text: #8ab4f8;
    --red: #f28b82;
    --green: #81c995;
    --yellow: #fdd663;
    --current-time: #f28b82;
    --shadow-sm: 0 1px 3px 0 rgba(0,0,0,.5), 0 1px 2px 0 rgba(0,0,0,.3);
    --shadow-md: 0 2px 6px 2px rgba(0,0,0,.5), 0 1px 2px 0 rgba(0,0,0,.3);
    --shadow-lg: 0 2px 6px 2px rgba(0,0,0,.5), 0 1px 2px 0 rgba(0,0,0,.3);
    --card-bg: #2d2d2d;
    --hour-height: 48px;
    --time-gutter: 56px;
    --label-width: 150px;
  }

  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg: #1f1f1f;
      --bg-secondary: #2d2d2d;
      --bg-hover: #3c3c3c;
      --bg-active: #4a4a4a;
      --text-primary: #e8eaed;
      --text-secondary: #9aa0a6;
      --text-icon: #9aa0a6;
      --text-muted: #9aa0a6;
      --border: #3c4043;
      --border-light: #3c4043;
      --accent: #8ab4f8;
      --accent-hover: #aecbfa;
      --accent-light: #1a3a5c;
      --accent-text: #8ab4f8;
      --red: #f28b82;
      --green: #81c995;
      --yellow: #fdd663;
      --current-time: #f28b82;
      --shadow-sm: 0 1px 3px 0 rgba(0,0,0,.5), 0 1px 2px 0 rgba(0,0,0,.3);
      --shadow-md: 0 2px 6px 2px rgba(0,0,0,.5), 0 1px 2px 0 rgba(0,0,0,.3);
      --shadow-lg: 0 2px 6px 2px rgba(0,0,0,.5), 0 1px 2px 0 rgba(0,0,0,.3);
      --card-bg: #2d2d2d;
      --hour-height: 48px;
      --time-gutter: 56px;
      --label-width: 150px;
    }
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text-primary);
    padding: 20px 24px;
    overflow-x: auto;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Header ──────────────────────────────────────────────────────────── */

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .header-left {
    display: flex;
    align-items: baseline;
    gap: 12px;
  }

  .header-title {
    font-size: 22px;
    font-weight: 400;
    color: var(--text-primary);
    letter-spacing: 0;
  }

  .header-date-range {
    font-size: 14px;
    color: var(--text-secondary);
  }

  /* ── Range pill buttons ──────────────────────────────────────────────── */

  .range-buttons {
    display: flex;
    gap: 8px;
  }

  .range-btn {
    padding: 6px 16px;
    border: 1px solid var(--border);
    background: var(--bg);
    border-radius: var(--radius-pill);
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
    font-family: var(--font);
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    line-height: 20px;
    user-select: none;
  }

  .range-btn:hover {
    background: var(--surface);
    border-color: var(--border);
  }

  .range-btn.active {
    background: var(--accent-bg);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ── Timeline container ──────────────────────────────────────────────── */

  .timeline-container {
    position: relative;
    min-width: 600px;
  }

  /* ── Time header ─────────────────────────────────────────────────────── */

  .time-header {
    display: flex;
    align-items: flex-end;
    margin-left: var(--label-width);
    height: 20px;
    position: relative;
    margin-bottom: 2px;
  }

  .time-mark {
    position: absolute;
    font-size: 10px;
    color: var(--text-secondary);
    transform: translateX(-50%);
    white-space: nowrap;
    user-select: none;
    font-weight: 500;
    letter-spacing: 0.2px;
  }

  /* ── Grid lines (vertical dashed at hour marks) ──────────────────────── */

  .grid-lines {
    position: absolute;
    top: 0;
    left: var(--label-width);
    right: 0;
    bottom: 0;
    pointer-events: none;
    z-index: 0;
  }

  .grid-line {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 1px;
    border-left: 1px dashed var(--border);
  }

  /* ── Calendar rows ───────────────────────────────────────────────────── */

  .calendar-rows {
    position: relative;
  }

  .calendar-row {
    display: flex;
    align-items: center;
    height: var(--row-height);
    border-bottom: 1px solid var(--border);
  }

  .calendar-row:first-child {
    border-top: 1px solid var(--border);
  }

  .calendar-label {
    width: var(--label-width);
    flex-shrink: 0;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
    padding-right: 12px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    text-align: right;
  }

  .timeline-bar {
    flex: 1;
    height: 100%;
    background: var(--bg);
    position: relative;
    overflow: hidden;
  }

  /* ── Busy blocks ─────────────────────────────────────────────────────── */

  .busy-block {
    position: absolute;
    top: 4px;
    bottom: 4px;
    background: var(--busy-bg);
    border-radius: var(--radius);
    cursor: default;
    transition: background 0.15s, box-shadow 0.15s;
    z-index: 1;
    min-width: 2px;
  }

  .busy-block:hover {
    background: var(--busy-hover);
    box-shadow: var(--shadow-tooltip);
    z-index: 2;
  }

  /* ── Busy tooltip ────────────────────────────────────────────────────── */

  .busy-tooltip {
    display: none;
    position: absolute;
    bottom: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--text-primary);
    color: #fff;
    font-size: 12px;
    font-family: var(--font);
    padding: 6px 10px;
    border-radius: var(--radius);
    white-space: nowrap;
    z-index: 100;
    pointer-events: none;
    box-shadow: var(--shadow-tooltip);
    line-height: 16px;
  }

  .busy-tooltip::after {
    content: '';
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-top-color: var(--text-primary);
  }

  .busy-block:hover .busy-tooltip {
    display: block;
  }

  /* ── Common free slots section ───────────────────────────────────────── */

  .common-section {
    margin-top: 24px;
    border: 1px solid var(--free-border);
    border-radius: var(--radius-md);
    padding: 16px 20px;
    background: var(--green-light);
  }

  .common-section-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--green);
    margin-bottom: 12px;
    letter-spacing: 0.1px;
  }

  .common-row {
    display: flex;
    align-items: center;
    height: var(--row-height);
  }

  .common-label {
    width: var(--label-width);
    flex-shrink: 0;
    font-size: 13px;
    font-weight: 500;
    color: var(--green);
    padding-right: 12px;
    text-align: right;
  }

  .common-bar {
    flex: 1;
    height: 28px;
    background: var(--bg);
    border-radius: var(--radius);
    position: relative;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  /* ── Free blocks ─────────────────────────────────────────────────────── */

  .free-block {
    position: absolute;
    top: 0;
    bottom: 0;
    background: var(--green);
    opacity: 0.6;
    border-radius: 2px;
    cursor: default;
    transition: opacity 0.15s;
    min-width: 2px;
  }

  .free-block:hover {
    opacity: 0.85;
  }

  .free-tooltip {
    display: none;
    position: absolute;
    bottom: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--text-primary);
    color: #fff;
    font-size: 12px;
    font-family: var(--font);
    padding: 6px 10px;
    border-radius: var(--radius);
    white-space: nowrap;
    z-index: 100;
    pointer-events: none;
    box-shadow: var(--shadow-tooltip);
    line-height: 16px;
  }

  .free-tooltip::after {
    content: '';
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-top-color: var(--text-primary);
  }

  .free-block:hover .free-tooltip {
    display: block;
  }

  /* ── Common slot chips ───────────────────────────────────────────────── */

  .common-slots-list {
    margin-top: 10px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .common-slot-chip {
    display: inline-flex;
    align-items: center;
    background: var(--green-chip);
    color: var(--green);
    font-size: 12px;
    font-weight: 500;
    padding: 4px 12px;
    border-radius: var(--radius-pill);
    line-height: 18px;
    letter-spacing: 0.1px;
  }

  /* ── Legend ───────────────────────────────────────────────────────────── */

  .legend {
    display: flex;
    gap: 20px;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text-secondary);
  }

  .legend-swatch {
    width: 12px;
    height: 12px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* ── Loading state ───────────────────────────────────────────────────── */

  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 0;
    color: var(--text-secondary);
    font-size: 14px;
  }

  .loading-spinner {
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 12px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* ── Empty / error state ─────────────────────────────────────────────── */

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-secondary);
    font-size: 14px;
  }

  .empty-state-icon {
    font-size: 36px;
    margin-bottom: 12px;
    opacity: 0.3;
  }
</style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <span class="header-title">Availability</span>
      <span class="header-date-range" id="dateRange"></span>
    </div>
    <div class="range-buttons">
      <button class="range-btn active" id="btnToday" data-range="today">Today</button>
      <button class="range-btn" id="btnWeek" data-range="week">This Week</button>
      <button class="range-btn" id="btnCustom" data-range="custom">Custom</button>
    </div>
  </div>
  <div id="content">
    <div class="loading">
      <div class="loading-spinner"></div>
      Waiting for availability data...
    </div>
  </div>
  <script type="module" src="./src/app.ts"></script>
</body>
</html>
