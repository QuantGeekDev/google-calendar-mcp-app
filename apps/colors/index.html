<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Color Palette</title>
<style>
  :root { --bg:#fff; --bg-secondary:#f8f9fa; --bg-hover:#f1f3f4; --bg-active:#e8eaed; --text-primary:#3c4043; --text-secondary:#70757a; --text-icon:#5f6368; --border:#dadce0; --border-light:#e8eaed; --accent:#1a73e8; --accent-hover:#1765cc; --accent-light:#e8f0fe; --red:#d93025; --red-light:#fce8e6; --green:#0b8043; --green-light:#e6f4ea; --yellow:#f9ab00; --shadow-sm:0 1px 2px 0 rgba(60,64,67,.3),0 1px 3px 1px rgba(60,64,67,.15); --shadow-md:0 1px 3px 0 rgba(60,64,67,.3),0 4px 8px 3px rgba(60,64,67,.15); --card-bg:#fff; --font-stack:'Google Sans',Roboto,Arial,sans-serif; }
  [data-theme="dark"] { --bg:#1f1f1f; --bg-secondary:#2d2d2d; --bg-hover:#3c3c3c; --bg-active:#4a4a4a; --text-primary:#e8eaed; --text-secondary:#9aa0a6; --text-icon:#9aa0a6; --border:#3c4043; --border-light:#3c4043; --accent:#8ab4f8; --accent-hover:#aecbfa; --accent-light:#1a3a5c; --red:#f28b82; --red-light:#5c2b29; --green:#81c995; --green-light:#1e3a2c; --yellow:#fdd663; --shadow-sm:0 1px 3px 0 rgba(0,0,0,.5),0 1px 2px 0 rgba(0,0,0,.3); --shadow-md:0 2px 6px 2px rgba(0,0,0,.5),0 1px 2px 0 rgba(0,0,0,.3); --card-bg:#2d2d2d; }
  @media(prefers-color-scheme:dark){:root:not([data-theme="light"]){ --bg:#1f1f1f; --bg-secondary:#2d2d2d; --bg-hover:#3c3c3c; --bg-active:#4a4a4a; --text-primary:#e8eaed; --text-secondary:#9aa0a6; --text-icon:#9aa0a6; --border:#3c4043; --border-light:#3c4043; --accent:#8ab4f8; --accent-hover:#aecbfa; --accent-light:#1a3a5c; --red:#f28b82; --red-light:#5c2b29; --green:#81c995; --green-light:#1e3a2c; --yellow:#fdd663; --shadow-sm:0 1px 3px 0 rgba(0,0,0,.5),0 1px 2px 0 rgba(0,0,0,.3); --shadow-md:0 2px 6px 2px rgba(0,0,0,.5),0 1px 2px 0 rgba(0,0,0,.3); --card-bg:#2d2d2d; }}
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:var(--font-stack); background:var(--bg); color:var(--text-primary); -webkit-font-smoothing:antialiased; line-height:1.5; padding:16px; }

  .cp-section-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
    padding: 12px 0 8px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 12px;
  }
  .cp-section-title:not(:first-child) {
    margin-top: 24px;
  }
  .cp-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  .cp-color-card {
    background: var(--card-bg);
    border: 1px solid var(--border-light);
    border-radius: 8px;
    padding: 12px;
    cursor: pointer;
    transition: background 0.15s, box-shadow 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    text-align: center;
  }
  .cp-color-card:hover {
    background: var(--bg-hover);
    box-shadow: var(--shadow-sm);
  }
  .cp-color-card:active {
    background: var(--bg-active);
  }
  .cp-swatch-lg {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .cp-color-name {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-primary);
    line-height: 1.3;
  }
  .cp-color-hex {
    font-size: 11px;
    color: var(--text-secondary);
    font-family: 'Roboto Mono', monospace;
  }
  .cp-color-id {
    font-size: 10px;
    color: var(--text-secondary);
  }
  #app { min-height: 100vh; }
</style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./src/app.ts"></script>
</body>
</html>
